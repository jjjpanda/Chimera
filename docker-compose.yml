services:
  chimera:
    build: .
    env_file: .env
    environment:
      TZ: UTC
    ports:
      - "${gateway_HTTP_HOST_PORT:-80}:${gateway_PORT}"
      - "${gateway_PORT_SECURE:-443}:${gateway_PORT_SECURE:-443}"
    volumes:
      - chimera-storage:/mnt/storage
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./motion.conf:/etc/motion/motion.conf:ro
      - ./cameraconf:/etc/motion/cameraconf
      - acme-webroot:/app/.well-known
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Automates initial issuance and renewal via HTTP-01.
  # Owns the read-write cert store so the gateway (ro mount) never holds write access.
  certbot:
    image: certbot/certbot
    environment:
      gateway_HOST: ${gateway_HOST}
      gateway_PORT: ${gateway_PORT}
      alert_URL: ${alert_URL}
    entrypoint: /bin/sh
    command:
      - -c
      - >-
        apk add --no-cache curl >/dev/null 2>&1 || true;
        DOMAIN=$$(echo "$$gateway_HOST" | sed -e 's|^http://||' -e 's|^https://||' | awk -F/ '{print $$1}' | awk -F: '{print $$1}');
        mkdir -p /webroot/.well-known/acme-challenge;
        if [ -n "$$DOMAIN" ]; then
        echo ready > /webroot/.well-known/acme-challenge/probe;
        tries=0;
        until curl -fsS "http://chimera:$$gateway_PORT/.well-known/acme-challenge/probe" 2>/dev/null | grep -q ready; do
        tries=$$((tries+1));
        if [ "$$tries" -ge 120 ]; then echo "gateway not serving /.well-known after ~10m; proceeding"; break; fi;
        sleep 5;
        done;
        fi;
        fails=0;
        while true; do
        if [ -n "$$DOMAIN" ] && [ ! -d "/etc/letsencrypt/live/$$DOMAIN" ]; then
        if certbot certonly --webroot -w /webroot -d "$$DOMAIN" --register-unsafely-without-email --agree-tos --non-interactive; then
        fails=0;
        else
        fails=$$((fails+1));
        if [ "$$fails" -lt 3 ]; then sleep 300; continue; fi;
        if [ "$$fails" -lt 5 ]; then sleep 3600; continue; fi;
        curl -fsS -X POST -H "Content-Type: application/json" -d "{\"content\": \"⚠️ certbot issuance failed for $$DOMAIN after repeated retries\"}" "$$alert_URL";
        fails=0;
        sleep 43200;
        continue;
        fi;
        fi;
        certbot renew --webroot -w /webroot --quiet ||
        curl -fsS -X POST -H "Content-Type: application/json" -d "{\"content\": \"⚠️ certbot renew failed on $$(hostname)\"}" "$$alert_URL";
        sleep 43200;
        done
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - acme-webroot:/webroot/.well-known
    depends_on:
      - chimera
    restart: unless-stopped

  postgres:
    image: postgres:15
    environment:
      TZ: UTC
      PGTZ: UTC
      POSTGRES_DB: ${database_NAME}
      POSTGRES_USER: ${database_USER}
      POSTGRES_PASSWORD: ${database_PASSWORD}
    volumes:
      - chimera-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      retries: 5
    restart: unless-stopped

volumes:
  chimera-pgdata:
  chimera-storage:
  acme-webroot:
