services:
  chimera:
    build: .
    environment:
      TZ: UTC
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # caps let entrypoint.sh chmod/chown volumes before gosu-dropping to node
    cap_add:
      - CHOWN
      - FOWNER
      - FSETID
      - SETUID
      - SETGID
    mem_limit: ${chimera_MEM_LIMIT:-2g}
    pids_limit: ${chimera_PIDS_LIMIT:-512}
    sysctls:
      - net.ipv4.ip_unprivileged_port_start=80
    ports:
      - "${gateway_PORT}:${gateway_PORT}"
      - "${gateway_PORT_SECURE:-443}:${gateway_PORT_SECURE:-443}"
    volumes:
      - chimera-storage:/mnt/storage
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./motion.conf:/etc/motion/motion.conf:ro
      - ./cameraconf:/etc/motion/cameraconf
      - acme-webroot:/app/.well-known
      - ./.env:/app/.env:ro
    # pm2-runtime streams all services here (file sinks -> /dev/null); the only log sink, only one rotated
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # HTTP-01 issuance/renewal; owns the RW cert store so the gateway (ro mount) never writes
  certbot:
    build: ./certbot
    environment:
      gateway_HOST: ${gateway_HOST}
      gateway_PORT: ${gateway_PORT}
      alert_URL: ${alert_URL}
      certbot_ON: ${certbot_ON}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # certbot-entry.sh chgrp/chmods cert files to the gateway's group
    cap_add:
      - CHOWN
    # gid 1000 = chimera's group on acme-webroot (chmod 2775); without it root+CHOWN can't write HTTP-01 files
    group_add:
      - "1000"
    mem_limit: 256m
    pids_limit: 128
    entrypoint: /bin/sh
    command: /certbot-entry.sh
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - acme-webroot:/webroot/.well-known
      - ./certbot-entry.sh:/certbot-entry.sh:ro
    depends_on:
      - chimera
    restart: unless-stopped

  postgres:
    image: postgres:15.18@sha256:74e110c41804365e3915fcc09d5e7a1eff50161aaa94d5da0e58e0cd75ae509c
    environment:
      TZ: UTC
      PGTZ: UTC
      POSTGRES_DB: ${database_NAME}
      POSTGRES_USER: ${database_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/database_PASSWORD
    secrets:
      - database_PASSWORD
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # initdb runs `find $PGDATA` as root on the 0700 data dir and reads a 0400
    # POSTGRES_PASSWORD_FILE — both reads, so DAC_READ_SEARCH suffices (not DAC_OVERRIDE)
    cap_add:
      - CHOWN
      - DAC_READ_SEARCH
      - SETUID
      - SETGID
    mem_limit: 1g
    pids_limit: 256
    volumes:
      - chimera-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      retries: 5
    restart: unless-stopped

volumes:
  chimera-pgdata:
  chimera-storage:
  acme-webroot:

secrets:
  database_PASSWORD:
    environment: "database_PASSWORD"
