name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

defaults:
  run:
    shell: powershell

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 22

      - name: Generate test .env
        run: Copy-Item .github/ci.env .env -Force

      - name: Install root dependencies
        run: npm install

      - name: Install module dependencies
        run: npm run install:modules

      - name: Run tests
        run: npm test

      - name: Coverage report comment
        if: ${{ always() && github.event_name == 'pull_request' }}
        continue-on-error: true
        uses: davelosert/vitest-coverage-report-action@2500dafcee7dd64f85ab689c0b83798a8359770e

      - name: Upload coverage artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: coverage
          path: coverage

  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm install

      - name: Install module dependencies
        run: npm run install:modules:frontend

      - name: Build frontend
        run: npm run build:command

      - name: Upload build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: command-dist
          path: command/dist

  e2e:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm install

      - name: Install module dependencies
        run: npm run install:modules:frontend

      - name: Install Playwright browser
        run: npm run e2e:install

      - name: Run e2e tests
        run: npm run e2e:command

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: playwright-report
          path: command/playwright-report
